<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Aurik Advisory</title>

  <style>
    :root {
      --navy: #111827;
      --ink: #1f2937;
      --muted: #6b7280;
      --gold: #b8892f;
      --cream: #fbfaf7;
      --line: #e5e0d6;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.6;
    }

    header {
      padding: 28px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 250, 247, 0.94);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--navy);
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .nav {
      display: flex;
      gap: 24px;
      font-size: 0.92rem;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      transition: 0.2s ease;
    }

    .nav a:hover {
      color: var(--navy);
    }

    .page-hero {
      padding: 80px 24px 30px;
      max-width: 720px;
      margin: 0 auto;
    }

    .eyebrow {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: block;
    }

    .page-hero h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 4vw, 3rem);
      line-height: 1.15;
      margin: 0 0 16px;
      color: var(--navy);
      letter-spacing: -0.02em;
    }

    .page-hero p {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 560px;
    }

    .form-wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 100px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--navy);
    }

    input, textarea {
      font-family: inherit;
      font-size: 1rem;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--white);
      color: var(--ink);
      resize: vertical;
    }

    input:focus, textarea:focus {
      outline: 2px solid var(--gold);
      outline-offset: 1px;
    }

    textarea {
      min-height: 160px;
    }

    .submit-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 6px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
      background: var(--navy);
      color: var(--white);
      transition: 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.12);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .form-status {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .form-status.success {
      color: #2f7a4f;
    }

    .form-status.error {
      color: #b3433f;
    }

    .direct-email {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      font-size: 0.92rem;
      color: var(--muted);
    }

    .direct-email a {
      color: var(--navy);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
    }

    footer {
      padding: 44px 8%;
      border-top: 1px solid var(--line);
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      max-width: 1280px;
      margin: 0 auto;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      header {
        padding: 22px 6%;
      }
      .page-hero {
        padding: 56px 24px 20px;
      }
      .nav {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="brand">Aurik Advisory</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="page-hero">
      <span class="eyebrow">Contact</span>
      <h1>Start a conversation.</h1>
      <p>Tell me a bit about what you're working through, and I'll follow up directly.</p>
    </section>

    <div class="form-wrapper">
      <!--
        FORMSPREE SETUP (free, no backend required):
        1. Go to https://formspree.io and sign up free with contact@aurikadvisory.com (or your Gmail)
        2. Create a new form, copy the unique endpoint it gives you
           (looks like: https://formspree.io/f/abc12345)
        3. Replace YOUR_FORM_ID below with that ID
        4. Formspree emails you every submission directly to your inbox
      -->
      <form id="contact-form" action="https://formspree.io/f/xkolnype" method="POST">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="field">
          <label for="company">Company <span style="text-transform:none; font-weight:400;">(optional)</span></label>
          <input type="text" id="company" name="company" />
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <div class="submit-row">
          <button class="button" type="submit" id="submit-btn">Send Message</button>
          <span class="form-status" id="form-status"></span>
        </div>
      </form>

      <div class="direct-email">
        Prefer email directly? Reach me at <a href="mailto:contact@aurikadvisory.com">contact@aurikadvisory.com</a>.
      </div>
    </div>

    <footer>
      <div>© 2026 Aurik Advisory. All rights reserved.</div>
      <div>contact@aurikadvisory.com</div>
    </footer>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      status.textContent = 'Sending...';
      status.className = 'form-status';

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          status.textContent = 'Message sent — thank you. I\'ll follow up shortly.';
          status.className = 'form-status success';
          form.reset();
        } else {
          status.textContent = 'Something went wrong. Please email contact@aurikadvisory.com directly.';
          status.className = 'form-status error';
        }
      } catch (err) {
        status.textContent = 'Something went wrong. Please email contact@aurikadvisory.com directly.';
        status.className = 'form-status error';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
